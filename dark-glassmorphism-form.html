<!--
Dark glassmorphism contact form for Nida dark-themed sites.
Drop this as a custom_html block on any page with render_mode: blocks.
Uses inline CSS for zero external dependencies.
-->

<style>
.nida-contact-section{position:relative;padding:140px 24px;background:#000;overflow:hidden}
.nida-contact-section::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(99,102,241,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(34,211,238,.10) 0%,transparent 50%);z-index:0}
.nida-contact-wrap{position:relative;z-index:2;max-width:560px;margin:0 auto;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.10);border-radius:28px;padding:52px 44px;backdrop-filter:blur(24px);box-shadow:0 40px 100px -24px rgba(0,0,0,.5)}
.nida-contact-head{text-align:center;margin-bottom:40px}
.nida-contact-head h2{font-size:clamp(1.6rem,3.2vw,2.2rem);font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:10px}
.nida-contact-head p{color:#6b7280;font-size:1rem;line-height:1.6;max-width:400px;margin:0 auto}
.nida-fgroup{margin-bottom:22px}
.nida-fgroup label{display:block;font-size:13px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.nida-fgroup input,.nida-fgroup textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 18px;color:#fff;font-size:15px;outline:none;transition:all .25s;box-sizing:border-box;font-family:inherit}
.nida-fgroup input::placeholder,.nida-fgroup textarea::placeholder{color:#475569}
.nida-fgroup input:focus,.nida-fgroup textarea:focus{border-color:rgba(99,102,241,.5);background:rgba(255,255,255,.08);box-shadow:0 0 20px rgba(99,102,241,.15)}
.nida-fgroup textarea{min-height:120px;resize:vertical}
.nida-frow{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.nida-submit-btn{width:100%;background:#fff;color:#000;padding:18px 28px;border-radius:16px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .3s;box-shadow:0 16px 50px -8px rgba(255,255,255,.25)}
.nida-submit-btn:hover{transform:translateY(-2px);box-shadow:0 20px 60px -8px rgba(255,255,255,.35)}
@media(max-width:560px){.nida-contact-wrap{padding:36px 24px}.nida-frow{grid-template-columns:1fr}}
</style>

<div class="nida-contact-section">
  <div class="nida-contact-wrap">
    <div class="nida-contact-head">
      <h2>Get in Touch</h2>
      <p>Have a project in mind? Drop us a line and we will get back within 24 hours.</p>
    </div>
    <form action="https://formspree.io/f/YOUR_ID" method="POST">
      <div class="nida-frow">
        <div class="nida-fgroup"><label>Name</label><input type="text" name="name" placeholder="Your name" required></div>
        <div class="nida-fgroup"><label>Email</label><input type="email" name="email" placeholder="you@company.com" required></div>
      </div>
      <div class="nida-fgroup"><label>Company</label><input type="text" name="company" placeholder="Acme Inc."></div>
      <div class="nida-fgroup"><label>Message</label><textarea name="message" placeholder="Tell us about your project..." required></textarea></div>
      <button type="submit" class="nida-submit-btn">Send Message &rarr;</button>
    </form>
  </div>
</div>
